[package]
name = "pdf_builder_native"
version = "0.1.0"
edition = "2021"

[lib]
# ⚡ CRITICAL: cdylib generates the compiled .wasm binary for web runtimes
crate-type = ["cdylib", "rlib"]

[dependencies]
wasm-bindgen = "0.2"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
taffy = "0.4"
printpdf = "0.7"