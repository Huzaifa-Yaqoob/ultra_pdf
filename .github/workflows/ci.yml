name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  actions: read
  contents: read

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          filter: tree:0
          fetch-depth: 0

      # Install bun
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Cache bun's package download cache (not node_modules — bun workspaces
      # create per-package node_modules that the root cache wouldn't cover)
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-cache-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - run: bun install --frozen-lockfile

      - run: bunx nx format:check --base="origin/main"
      - run: bunx nx run-many -t lint test build typecheck
